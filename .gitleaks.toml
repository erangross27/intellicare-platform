# gitleaks configuration for IntelliCare
# Extends the default ruleset; allowlists known false positives.
[extend]
useDefault = true

[allowlist]
description = "False positives: presentational field maps / clinical data, not secrets"
# These files are declarative field-definition maps (`{ key: 'cd34PositiveCells', ... }`)
# and static clinical reference data. gitleaks' generic-api-key heuristic matches the
# camelCase medical identifiers; they contain no credentials.
paths = [
  '''apps/frontend-vite/src/components/artifact/pdf-templates/.*\.jsx$''',
  '''scripts/import-medicare-formulary\.js$''',
]
