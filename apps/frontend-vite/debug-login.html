<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Debug Login Token</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 5px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .result { margin-top: 10px; padding: 10px; background: white; border: 1px solid #ddd; border-radius: 5px; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🔍 Debug Login Token Issue</h1>
    
    <div class="section">
        <h2>Step 1: Login and Check Token</h2>
        <button onclick="loginAndCheck()">Login with Developer Clinic</button>
        <div id="loginResult" class="result"></div>
    </div>
    
    <div class="section">
        <h2>Step 2: Check Stored Token</h2>
        <button onclick="checkStoredToken()">Check Token in Storage</button>
        <div id="tokenResult" class="result"></div>
    </div>
    
    <div class="section">
        <h2>Step 3: Test Chat API Call</h2>
        <button onclick="testChatAPI()">Test Chat API</button>
        <div id="chatResult" class="result"></div>
    </div>

    <script>
        async function loginAndCheck() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = 'Logging in...';
            
            try {
                const response = await fetch('http://localhost:5000/api/clinic-auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-clinic-subdomain': 'developer'
                    },
                    body: JSON.stringify({
                        email: 'eran@gross.support',
                        password: 'Mk!p93Mk!p93'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Store the token
                    sessionStorage.setItem('token', result.token);
                    sessionStorage.setItem('user', JSON.stringify(result.user));
                    localStorage.setItem('clinic', JSON.stringify(result.clinic));
                    localStorage.setItem('clinicSubdomain', result.clinic.subdomain);
                    
                    // Check token format
                    const tokenParts = result.token.split('.');
                    
                    resultDiv.innerHTML = `<span class="success">✅ Login successful!</span>

User: ${result.user.fullName}
Clinic: ${result.clinic.name}

Token Info:
- Full token: ${result.token.substring(0, 50)}...
- Token parts: ${tokenParts.length} (should be 3)
- Header: ${tokenParts[0] ? tokenParts[0].substring(0, 20) + '...' : 'MISSING'}
- Payload: ${tokenParts[1] ? tokenParts[1].substring(0, 20) + '...' : 'MISSING'}
- Signature: ${tokenParts[2] ? tokenParts[2].substring(0, 20) + '...' : 'MISSING'}

Stored in sessionStorage: ${sessionStorage.getItem('token') === result.token ? '✅ YES' : '❌ NO'}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ Login failed: ${JSON.stringify(result.message)}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }
        
        function checkStoredToken() {
            const resultDiv = document.getElementById('tokenResult');
            
            const sessionToken = sessionStorage.getItem('token');
            const localToken = localStorage.getItem('token');
            
            resultDiv.innerHTML = `Token Storage Check:

SessionStorage token: ${sessionToken ? sessionToken.substring(0, 50) + '...' : 'NOT FOUND'}
LocalStorage token: ${localToken ? localToken.substring(0, 50) + '...' : 'NOT FOUND'}

SessionStorage token parts: ${sessionToken ? sessionToken.split('.').length : 0} (should be 3)
LocalStorage token parts: ${localToken ? localToken.split('.').length : 0} (should be 3)`;
        }
        
        async function testChatAPI() {
            const resultDiv = document.getElementById('chatResult');
            resultDiv.innerHTML = 'Testing chat API...';
            
            const token = sessionStorage.getItem('token') || localStorage.getItem('token');
            const subdomain = localStorage.getItem('clinicSubdomain') || 'developer';
            
            if (!token) {
                resultDiv.innerHTML = '<span class="error">❌ No token found! Please login first.</span>';
                return;
            }
            
            resultDiv.innerHTML += `\n\nUsing token: ${token.substring(0, 50)}...`;
            resultDiv.innerHTML += `\nToken format valid: ${token.split('.').length === 3 ? '✅ YES' : '❌ NO'}`;
            
            try {
                const response = await fetch('http://localhost:5000/api/agent/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-auth-token': token,
                        'x-clinic-subdomain': subdomain
                    },
                    body: JSON.stringify({
                        message: 'מה השעה?',
                        sessionId: Date.now().toString(),
                        language: 'he'
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML += `\n\n<span class="success">✅ Chat API call successful!</span>
Response: ${JSON.stringify(result, null, 2)}`;
                } else {
                    resultDiv.innerHTML += `\n\n<span class="error">❌ Chat API failed (${response.status}): ${JSON.stringify(result)}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML += `\n\n<span class="error">❌ Error calling chat API: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
