# IntelliCare local DNS configuration for dnsmasq
# This resolves intellicare.health and all subdomains to localhost

# Main domain
address=/intellicare.health/127.0.0.1

# Wildcard for all subdomains (e.g., stanford.intellicare.health)
address=/.intellicare.health/127.0.0.1

# Listen on localhost only for DNS queries
listen-address=127.0.0.1

# Don't read /etc/resolv.conf for upstream servers
no-resolv

# Use Google DNS as upstream for other domains
server=8.8.8.8
server=8.8.4.4

# Disable DHCP server
no-dhcp-interface=lo

# DNS cache size
cache-size=1000

# Log DNS queries (optional, for debugging)
# log-queries